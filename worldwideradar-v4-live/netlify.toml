[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173

# ── Security headers on ALL pages ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking protection
    X-Frame-Options = "DENY"
    # MIME sniffing protection
    X-Content-Type-Options = "nosniff"
    # Referrer control — don't leak full URL to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Enforce HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Permissions policy — deny access to sensitive browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    # Content Security Policy — strict allowlist
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://upload.wikimedia.org https://en.wikipedia.org; connect-src 'self' https://api.gdeltproject.org https://api.rss2json.com https://en.wikipedia.org https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; worker-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    # Cache static assets aggressively, no-store for HTML
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets can be cached longer
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API functions — lock CORS to your domain only
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://worldwideradar.com"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    X-Content-Type-Options = "nosniff"

# Redirect all HTTP to HTTPS
[[redirects]]
  from = "http://worldwideradar.com/*"
  to   = "https://worldwideradar.com/:splat"
  status = 301
  force = true

# www → apex redirect
[[redirects]]
  from = "https://www.worldwideradar.com/*"
  to   = "https://worldwideradar.com/:splat"
  status = 301
  force = true

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
