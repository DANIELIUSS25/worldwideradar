# ── BUILD ───────────────────────────────────────────────────────────────────────
[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

# ── SPA ROUTING ─────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/region/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/methodology"
  to     = "/index.html"
  status = 200

# ── HTTP → HTTPS ─────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "http://worldwideradar.com/*"
  to     = "https://worldwideradar.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.worldwideradar.com/*"
  to     = "https://worldwideradar.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.worldwideradar.com/*"
  to     = "https://worldwideradar.com/:splat"
  status = 301
  force  = true

# ── SECURITY HEADERS ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    X-XSS-Protection           = "1; mode=block"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; worker-src 'self' blob:; child-src 'self' blob:; connect-src 'self' blob: https://api.gdeltproject.org https://en.wikipedia.org https://cdn.jsdelivr.net https://reliefweb.int https://worldwideradar.com https://worldwideradar.netlify.app https://basemaps.cartocdn.com https://*.cartocdn.com https://a.basemaps.cartocdn.com https://b.basemaps.cartocdn.com https://c.basemaps.cartocdn.com https://d.basemaps.cartocdn.com https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'"

# ── FUNCTION CORS ───────────────────────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://worldwideradar.com"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# ── STATIC ASSET CACHE ──────────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/region/*"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/methodology"
  to   = "/index.html"
  status = 200
